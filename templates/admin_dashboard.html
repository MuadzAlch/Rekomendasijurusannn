<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="../static/style.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js"></script>
</head>

<body class="sb-nav-fixed">

{% include 'header_admin.html' %}

<div id="layoutSidenav_content">
<main>

<div class="container-fluid px-4 mt-4">

<h1 class="mt-4">Halo, {{ username }} </h1>

<div class="row mt-4">

<!-- Total Data Siswa -->
<div class="col-xl-6">
<div class="card bg-primary text-white mb-4">
<div class="card-body">
Total Data Siswa
<h2>{{ total_users }}</h2>
</div>
</div>
</div>

<!-- Total Request -->
<div class="col-xl-6">
<div class="card bg-success text-white mb-4">
<div class="card-body">
Total Permintaan Rekomendasi
<h2>{{ total_requests }}</h2>
</div>
</div>
</div>

</div>
{% if session['role'] == 'admin' %}
<a href="/admin/report/pdf" class="btn btn-primary">
    Download PDF
</a>
{% endif %}


<!-- CHART CARD -->
<div class="card mb-4">
<div class="card-header">
Grafik Rekomendasi Jurusan
</div>

<div class="card-body text-center">

<!-- Wrapper biar kecil -->
<div style="width:320px; height:320px; margin:auto;">
<canvas id="jurusanChart"></canvas>
</div>

</div>
</div>

</div>
</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('jurusanChart');

const dataValues = [
    {{tkj}},
    {{tkr}},
    {{mm}},
    {{ap}}
];

const total = dataValues.reduce((a,b)=>a+b,0);

new Chart(ctx, {
    type: 'doughnut',
    data: {
        labels: ['TKJ','TKR','MM','AP'],
        datasets: [{
            data: dataValues,
            backgroundColor: [
                '#4e73df',
                '#1cc88a',
                '#f6c23e',
                '#e74a3b'
            ]
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false, // penting!
        plugins: {
            legend: {
                position: 'bottom'
            },
            tooltip: {
                callbacks: {
                    label: function(context){
                        let val = context.raw;
                        let percent = total ? ((val/total)*100).toFixed(1) : 0;
                        return `${context.label}: ${val} siswa (${percent}%)`;
                    }
                }
            }
        }
    }
});
</script>

</body>
</html>
