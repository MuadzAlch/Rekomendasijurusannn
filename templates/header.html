<!-- templates/header.html -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo"
                class="d-inline-block align-text-top me-2"
                style="height: 60px; width: auto; object-fit: contain; max-height: 60px;">

            <div class="d-flex flex-column">
                <span style="font-size: 1.2rem; font-weight: bold;">Sistem Rekomendasi Jurusan</span>
                <span style="font-size: 1rem;">SMKN 8 Garut</span>
            </div>


        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                {% if session.get('user_role') == 'admin' %}
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard">Dashboard Admin</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                {% endif %}
                {% if session.get('username') %}
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout ({{ session.get('username') }})</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="/login">Login</a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
